output_dir: output

database:
  path: data/autoresearch.db

discovery:
  # Max concurrent outbound HTTP requests during discovery (default 6).
  api_concurrency: 6
  # Self-expanding discovery: automatically add new keywords/subreddits based on what works
  auto_expand: true
  exploration_slots_per_cycle: 1
  theme_query_limit_per_cycle: 2
  max_queries_per_concept: 1
  query_family_decay_hours: 18
  query_family_decay_min_queries: 2
  screened_out_retention:
    max_findings: 2000
  source_selection:
    always_run: ["reddit"]
    exploratory_low_yield_sources_per_cycle: 1
    low_yield_min_runs: 50
  expansion:
    max_keywords_per_wave: 8
    max_subreddits_per_wave: 8
    min_validation_score: 0.25  # Lowered to enable auto-expansion
    cooldown_hours: 1  # Reduced for faster iteration
  term_lifecycle:
    max_zero_yield_runs_before_weak: 12
    max_zero_yield_runs_before_exhausted: 40
    max_discussion_fallback_zero_yield_runs: 6
    paused_cooldown_waves: 3

  # LLM-driven discovery expansion: propose new problem spaces from validated opportunities
  llm_expansion:
    enabled: true  # Set true to enable LLM-driven space expansion
    trigger_after_cycles: 1      # Minimum discovery cycles before first expansion
    trigger_interval_cycles: 1   # How often to re-run expansion
    max_proposed_spaces: 4       # Max new spaces per expansion call
    min_validated_for_promoted: 1
    min_prototype_candidates: 1
    max_idle_cycles_for_exhausted: 3
    max_idle_cycles_for_archived: 10
    fallback_to_keywords: true    # Fall back to keyword expansion when LLM unavailable
    max_keywords_per_space: 10
    max_subreddits_per_space: 5
    max_web_queries_per_space: 5
    max_github_queries_per_space: 3

  # Web discovery options
  web:
    # Use Jina Reader for content extraction (free, no API key)
    # Falls back to MCP fetcher or requests+BeautifulSoup if disabled
    use_jina_reader: true
    # Hard caps per web lane so run-once stays responsive even when web search is slow.
    success_timeout_seconds: 10
    market_timeout_seconds: 8
    problem_timeout_seconds: 15

  # `web` = broad web search + marketplace pain threads (see DiscoveryAgent._check_source).
  sources:
    - reddit
  candidate_filter:
    min_score: 2
    behavioral_min_signals: 2
    behavioral_penalty: 1
  # App/plugin review lanes (1–2 star pain). Tune slugs/handles to niches you care about.
  shopify_reviews:
    # Public storefront HTML scrape (no Shopify Partner/Admin API). Slugs: https://apps.shopify.com/<handle>
    # Leave empty to auto-discover from sitemap
    app_handles: []
    max_apps: 3
    reviews_per_app: 3
    rating_filters: [1, 2]
    sort_by: newest
    rate_limit_cooldown_seconds: 900
  github:
    timeout_seconds: 8
    hard_skip_after_zero_yield: false
  wordpress_reviews:
    plugin_slugs:
      - woocommerce
      - fluent-crm
      - wordfence
      - updraftplus
    reviews_per_plugin: 5
    star_filters: [1, 2]
  # YouTube comments for problem discovery
  youtube_comments:
    keywords:
      - "shopify app review 2024"
      - "best shopify apps"
      - "shopify app recommendations"
      - "shopify app vs"
      - "ecommerce tools review"

  # Wider surface area → more new threads vs. only default subs/queries (dedupe is by content_hash).
  reddit:
    # Reddit /search.json time filter: hour|day|week|month|year|all — use "all" to include older posts.
    search_time_filter: month
    # true = search r/all to expand the discovery surface once dead niche lanes are retired.
    use_r_all: true
    # Per wave: how many subs × keywords to combine (each pair = one search). Use 0 = no cap (use entire lists).
    max_subreddits_per_wave: 6
    max_keywords_per_wave: 6
    pair_concurrency: 3
    # Prime only a small, diversified relay seed set per run.
    reddit_seed_query_limit: 8
    # Favor precision and throughput over breadth in discovery.
    search_sorts: ["new"]
    # Per sort mode result limit and hard cap per sub×keyword pair after URL dedupe.
    per_sort_limit: 2
    max_docs_per_pair: 6
    problem_subreddits:
      - accounting
      - Bookkeeping
      - Excel
      - smallbusiness
      - smallbiz
      - EtsySellers
      - ecommerce
      - shopify
      - projectmanagement
      - automation
      - sysadmin
      - msp
      - devops
      - notion
      - airtable
      - webdev
      - selfhosted
      - sales
      - productivity
      - Entrepreneur
      - indiehackers
      - SaaS
      - startups
      - freelance
    problem_keywords:
      - "manual reconciliation"
      - "invoice reconciliation"
      - "payment reconciliation"
      - "billing errors spreadsheet"
      - "reconciliation workflow"
      - "accounts receivable automation"
      - "spreadsheet reconciliation process"
      - "manual handoff workflow"
      - "month end close spreadsheet"
      - "sales channel reconciliation spreadsheet"
      - "bank deposit reconciliation spreadsheet"
      - "returns workflow spreadsheet"
      - "supplier data spreadsheet workflow"
      - '"order received" "label printed" whatsapp spreadsheet'
      - "held together by spreadsheets"
      - "copy paste workflow"
    # Optional buckets for suggest-discovery to return per-theme keyword hints.
    theme_keywords:
      saas:
        - "subscription billing"
        - "customer onboarding"
        - "support queue"
      money:
        - "cash flow"
        - "manual reconciliation"
        - "invoice mismatch"
      build:
        - "deployment pain"
        - "release checklist"
        - "integration breakage"

orchestration:
  evidence_concurrency: 3
  run_once_max_wait_seconds: 180
  stalled_idle_cycles_threshold: 50
  evidence_timeout_seconds: 120
  # After validation: generate SaaS/product ideas when decision is promote OR selection_status is prototype_candidate.
  auto_ideate_after_validation: true
  # `python cli.py run`: repeat discovery waves after each drain (sleep retry_interval_seconds).
  # Use this for long-running sessions without tying loops to stop_on_hit.
  continuous_waves: true
  # When enabled, `python cli.py run` can stop after a validation "hit"
  # (default: prototype_candidate OR promote). See orchestrator.stop_on_hit_matches.
  # Set exit_on_hit: false to keep running after a hit while continuous_waves is on.
  stop_on_hit:
    enabled: false
    exit_on_hit: true
    selection_status_any:
      - prototype_candidate
    decision_any:
      - promote
    # Pause between discovery waves when looping. Use 0 for back-to-back waves (only the
    # pipeline drain wait applies). Increase if you need to ease API rate limits.
    retry_interval_seconds: 0

builder:
  auto_build: false

# Security agent for vulnerability scanning
security:
  enabled: true
  min_severity: "nit"  # blocker, suggestion, nit

# Technical writer for auto-documentation
technical_writer:
  enabled: true
  output_dir: "output/docs"

# SRE agent for wedge health monitoring
sre:
  enabled: true
  score_drop_threshold: 0.15
  validation_drop_threshold: 0.30
  corroboration_min: 0.3
  stall_days: 7

# LLM config for builder_v2 code generation
llm:
  provider: ollama
  model: gemma4:latest
  base_url: http://localhost:11434
  max_tokens: 2000
  timeout: 180

build_prep:
  wedge_evaluation:
    feedback_to_discovery_terms: false
  platform_classification:
    provider: ollama
    base_url: http://127.0.0.1:11434/v1
    api_key: ollama
    model: gemma4:latest
    timeout_seconds: 60

validation:
  promotion_threshold: 0.42
  park_threshold: 0.15
  sharp_research:
    decision_margin_below_park: 0.035
    decision_floor_min: 0.10
    problem_truth_score: 0.115
    revenue_readiness_score: 0.18
    evidence_quality: 0.42
    value_support: 0.38
    frequency_score: 0.25
    workaround_density: 0.34
    cost_of_inaction: 0.40
    buildability: 0.52
  # Evidence/gathering search settings
  search:
    query_terms: 14
    recurrence_results: 6
    competitor_results: 8
    evidence_sample: 5
    recurrence_budget_seconds: 45.0
    competitor_budget_seconds: 20.0
    max_results_per_domain: 2
    # DuckDuckGo provider backend: "duckduckgo" (HTML) or "brave" or "google" etc
    ddgs_backend: duckduckgo
    # Extra results to fetch beyond max_results to allow deduplication headroom
    ddgs_extra_results: 4
    # Result truncation lengths
    result_title_length: 180
    result_snippet_length: 320
    # HTTP user-agent sent with search requests
    search_user_agent: "Mozilla/5.0 (compatible; AutoResearcher/1.0)"
    # Provider (ddgs/duckduckgo_search) timeouts per intent (seconds)
    provider_timeout_recurrence: 8
    provider_timeout_competitor: 10
    provider_timeout_general: 12
    # HTTP request timeouts per intent (seconds)
    request_timeout_recurrence: 10
    request_timeout_competitor: 12
    request_timeout_general: 20

reddit_bridge:
  enabled: true
  mode: bridge_with_fallback
  seed_on_miss: true
  base_url: ${REDDIT_BRIDGE_BASE_URL}
  auth_token: ${REDDIT_BRIDGE_AUTH_TOKEN}

reddit_relay:
  auth_token: ${REDDIT_RELAY_AUTH_TOKEN}
  allow_no_auth: false
