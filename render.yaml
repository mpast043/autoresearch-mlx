services:
  - name: autoresearch-relay
    type: web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python cli.py reddit-relay --host 0.0.0.0 --port 10000
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: REDDIT_RELAY_AUTH_TOKEN
        sync: false
